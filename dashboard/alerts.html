<!DOCTYPE html>
<html lang="de">
	<head>
		<meta charset="UTF-8" />
		<link rel="stylesheet" href="shared.css" />
		<style>
			.history-list {
				list-style: none;
				max-height: 300px;
				overflow-y: auto;
			}
			.history-item {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 4px 8px;
				border-bottom: 1px solid #2a2a4a;
				font-size: 12px;
			}
			.history-item:last-child {
				border-bottom: none;
			}
			.history-time {
				color: #7f8c8d;
				font-size: 11px;
				min-width: 50px;
			}
			.priority-badge {
				font-size: 10px;
				color: #b9a3e3;
				margin-left: auto;
				flex-shrink: 0;
			}
		</style>
	</head>
	<body>
		<h2>Alert Queue</h2>

		<!-- Connection Status -->
		<div id="connection-status" class="status-indicator status-disconnected">
			<span class="status-dot"></span>
			<span id="status-text">Nicht verbunden</span>
		</div>

		<!-- Current Alert -->
		<div class="card">
			<h3>Aktueller Alert</h3>
			<div id="current-alert" class="empty-state">Kein Alert aktiv</div>
		</div>

		<!-- Queue -->
		<div class="card">
			<h3>Warteschlange (<span id="queue-count">0</span>)</h3>
			<div class="config-row" style="margin-bottom: 8px;">
				<label class="toggle" style="margin-bottom:0;">
					<input type="checkbox" id="toggle-pause" autocomplete="off" />
					<span class="toggle-slider"></span>
				</label>
				<span id="pause-label" style="font-size: 12px; font-weight: 600; color: #ccc;">Alerts aktiv</span>
			</div>
			<ul id="queue-list" class="queue-list">
				<li class="empty-state">Queue ist leer</li>
			</ul>
			<div class="btn-group" style="margin-top: 8px;">
				<button id="btn-skip" class="btn-secondary btn-small">Alert überspringen</button>
				<button id="btn-clear" class="btn-danger btn-small">Queue leeren</button>
			</div>
		</div>

		<!-- Test Triggers -->
		<div class="card">
			<h3>Test Alerts</h3>
			<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px;">
				<div style="display:flex;flex-direction:column;gap:2px;">
					<label style="font-size:11px;color:#7f8c8d;">Typ</label>
					<select id="test-type" style="width:130px;">
						<option value="follow">Follow</option>
						<option value="sub">Sub</option>
						<option value="resub">Resub</option>
						<option value="subgift">Gift Sub</option>
						<option value="bits">Bits</option>
						<option value="raid">Raid</option>
						<option value="channelpoints">Channel Points</option>
					</select>
				</div>
				<div style="display:flex;flex-direction:column;gap:2px;">
					<label style="font-size:11px;color:#7f8c8d;">Username</label>
					<input type="text" id="test-username" placeholder="TestUser" style="width:120px;" />
				</div>
				<div style="display:flex;flex-direction:column;gap:2px;">
					<label style="font-size:11px;color:#7f8c8d;">Message</label>
					<input type="text" id="test-message" placeholder="(optional)" style="width:150px;" />
				</div>
				<div style="display:flex;flex-direction:column;gap:2px;">
					<label style="font-size:11px;color:#7f8c8d;">Amount</label>
					<input type="number" id="test-amount" placeholder="0" style="width:70px;" />
				</div>
				<button id="btn-test-custom" class="btn-primary btn-small">Test senden</button>
			</div>
			<div class="btn-group">
				<button class="btn-test btn-primary btn-small" data-type="follow">Follow</button>
				<button class="btn-test btn-primary btn-small" data-type="sub">Sub</button>
				<button class="btn-test btn-primary btn-small" data-type="resub">Resub</button>
				<button class="btn-test btn-primary btn-small" data-type="subgift">Gift Sub</button>
				<button class="btn-test btn-small" data-type="bits" style="background:#ff8c00;color:#fff;">Bits</button>
				<button class="btn-test btn-small" data-type="raid" style="background:#e91916;color:#fff;">Raid</button>
				<button class="btn-test btn-small" data-type="channelpoints" style="background:#00c896;color:#fff;">Channel Points</button>
			</div>
		</div>

		<!-- Alert History -->
		<div class="card">
			<h3>Alert-Verlauf</h3>
			<ul id="history-list" class="history-list">
				<li class="empty-state">Noch keine Alerts</li>
			</ul>
			<div class="btn-group" style="margin-top: 8px;">
				<button id="btn-clear-history" class="btn-secondary btn-small">Verlauf leeren</button>
			</div>
		</div>

		<script type="module" src="./alerts.js"></script>
	</body>
</html>
