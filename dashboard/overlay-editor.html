<!DOCTYPE html>
<html lang="de">
	<head>
		<meta charset="UTF-8" />
		<link rel="stylesheet" href="shared.css" />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;800&family=Open+Sans:wght@400;700;800&family=Montserrat:wght@400;700;800&family=Poppins:wght@400;700;800&family=Oswald:wght@400;700&family=Bangers&family=Permanent+Marker&family=Press+Start+2P&family=Fredoka+One&family=Outfit:wght@400;700;800&display=swap" />
		<style>
			div#alert-types {
    			display: ruby;
			}
			.alert-type-section {
				margin-bottom: 14px;
			}
			.alert-type-header {
				display: flex;
				align-items: center;
				gap: 10px;
				margin-bottom: 8px;
			}
			.alert-type-header h3 {
				margin: 0;
				flex: 1;
			}
			.config-row {
				display: flex;
				gap: 8px;
				align-items: center;
				margin-bottom: 6px;
			}
			.config-row label {
				min-width: 80px;
				margin-bottom: 0;
			}
			.config-row input,
			.config-row select {
				margin-bottom: 0;
				flex: 1;
			}
			.color-group {
				display: flex;
				gap: 8px;
				align-items: center;
			}
			.color-group label {
				font-size: 11px;
				min-width: auto;
			}
			.toggle-group {
				display: flex;
				gap: 16px;
				align-items: center;
			}
			.toggle-group label.toggle-label {
				font-size: 12px;
				font-weight: 600;
				color: #ccc;
				min-width: auto;
				margin-bottom: 0;
			}
			.range-value {
				font-size: 12px;
				color: #b9a3e3;
				min-width: 36px;
				text-align: center;
			}
			.hint-text {
				font-size: 11px;
				color: #7f8c8d;
				margin-left: 4px;
			}
		/* Preview */
		.preview-container {
			margin-top: 10px;
			padding: 12px;
			background: #0d1117;
			border-radius: 6px;
			border: 1px solid #3a3a5c;
			overflow: hidden;
		}
		.preview-container .preview-label {
			font-size: 11px;
			color: #7f8c8d;
			text-transform: uppercase;
			letter-spacing: 1px;
			margin-bottom: 8px;
		}
		.preview-box {
			position: relative;
			min-width: 260px;
			max-width: 100%;
			border-radius: 8px;
			overflow: hidden;
			box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
		}
		.preview-box .preview-bg-overlay {
			display: none;
			position: absolute;
			top: 0; left: 0; right: 0; bottom: 0;
			border-radius: 8px;
			z-index: 0;
		}
		.preview-box.has-bg-image .preview-bg-overlay {
			display: block;
		}
		.preview-box .alert-inner {
			position: relative;
			z-index: 1;
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 12px 16px;
		}
		.preview-box .alert-icon {
			font-size: 24px;
			flex-shrink: 0;
		}
		.preview-box .alert-content {
			flex: 1;
			min-width: 0;
		}
		.preview-box .alert-type-label {
			font-size: 9px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 1.2px;
			opacity: 0.8;
			margin-bottom: 2px;
		}
		.preview-box .alert-username {
			font-size: 16px;
			font-weight: 800;
			line-height: 1.2;
		}
		.preview-box .alert-message {
			font-size: 11px;
			opacity: 0.9;
			margin-top: 2px;
			line-height: 1.3;
		}
		.preview-box .alert-accent-bar {
			position: relative;
			z-index: 1;
			height: 3px;
			width: 100%;
		}
		.preview-buttons {
			display: flex;
			gap: 6px;
			margin-top: 8px;
		}

		/* Preview Animations */
		@keyframes previewSlideIn {
			0% { transform: translateY(40px); opacity: 0; }
			100% { transform: translateY(0); opacity: 1; }
		}
		@keyframes previewSlideOut {
			0% { transform: translateY(0); opacity: 1; }
			100% { transform: translateY(40px); opacity: 0; }
		}
		@keyframes previewFadeIn {
			0% { opacity: 0; transform: scale(0.9); }
			100% { opacity: 1; transform: scale(1); }
		}
		@keyframes previewFadeOut {
			0% { opacity: 1; transform: scale(1); }
			100% { opacity: 0; transform: scale(0.9); }
		}
		@keyframes previewBounceIn {
			0% { transform: scale(0.3); opacity: 0; }
			50% { transform: scale(1.08); opacity: 1; }
			70% { transform: scale(0.95); }
			100% { transform: scale(1); opacity: 1; }
		}
		@keyframes previewBounceOut {
			0% { transform: scale(1); opacity: 1; }
			30% { transform: scale(1.05); }
			100% { transform: scale(0.3); opacity: 0; }
		}

		.preview-box.anim-slide-in { animation: previewSlideIn 0.5s ease-out forwards; }
		.preview-box.anim-slide-out { animation: previewSlideOut 0.4s ease-in forwards; }
		.preview-box.anim-fade-in { animation: previewFadeIn 0.5s ease-out forwards; }
		.preview-box.anim-fade-out { animation: previewFadeOut 0.4s ease-in forwards; }
		.preview-box.anim-bounce-in { animation: previewBounceIn 0.6s ease-out forwards; }
		.preview-box.anim-bounce-out { animation: previewBounceOut 0.4s ease-in forwards; }
		</style>
	</head>
	<body>
		<h2>Overlay Editor</h2>

		<div class="btn-group" style="margin-bottom: 12px;">
			<button id="btn-save-config-top" class="btn-primary">Alle Einstellungen speichern</button>
			<button id="btn-export-config-top" class="btn-secondary">Config exportieren</button>
			<button id="btn-import-config-top" class="btn-secondary">Config importieren</button>
		</div>
		<input type="file" id="import-file-input" accept=".json" style="display:none;" />

		<div class="card" style="margin-bottom:12px;">
			<h3>Themes / Presets</h3>
			<p style="font-size:11px;color:#7f8c8d;margin-bottom:8px;">Überschreibt alle visuellen Einstellungen. Nachrichten-Templates bleiben erhalten.</p>
			<div class="btn-group">
				<button class="btn-theme btn-small" data-theme="neon" style="background:#0f0f23;color:#0ff;border:1px solid #0ff;">Neon</button>
				<button class="btn-theme btn-small" data-theme="retro" style="background:#2d1b00;color:#ffa500;border:1px solid #ffa500;">Retro</button>
				<button class="btn-theme btn-small" data-theme="minimal" style="background:#f5f5f5;color:#333;border:1px solid #ccc;">Minimal</button>
				<button class="btn-theme btn-small" data-theme="default" style="background:#6441a5;color:#fff;">Standard</button>
			</div>
		</div>

		<div id="alert-types"></div>

		<div class="btn-group" style="margin-top: 12px;">
			<button id="btn-save-config" class="btn-primary">Alle Einstellungen speichern</button>
			<button id="btn-export-config" class="btn-secondary">Config exportieren</button>
			<button id="btn-import-config" class="btn-secondary">Config importieren</button>
		</div>

		<script type="module" src="./overlay-editor.js"></script>
	</body>
</html>
