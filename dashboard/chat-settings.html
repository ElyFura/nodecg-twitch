<!DOCTYPE html>
<html lang="de">
	<head>
		<meta charset="UTF-8" />
		<link rel="stylesheet" href="shared.css" />
		<style>
			.section-title {
				font-size: 13px;
				font-weight: 700;
				color: #b9a3e3;
				margin-bottom: 8px;
				padding-bottom: 4px;
				border-bottom: 1px solid #3a3a5c;
			}

			.config-row {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 8px;
			}

			.config-row > label {
				min-width: 120px;
				flex-shrink: 0;
				margin-bottom: 0;
			}

			.config-row input[type="text"],
			.config-row input[type="number"],
			.config-row select,
			.config-row textarea {
				flex: 1;
				margin-bottom: 0;
			}

			.config-row input[type="number"] {
				max-width: 100px;
			}

			.config-row input[type="color"] {
				flex: 0;
				min-width: 30px;
			}

			.config-row textarea {
				font-size: 12px;
				resize: vertical;
				min-height: 40px;
			}

			.hint-text {
				font-size: 11px;
				color: #7f8c8d;
			}

			.custom-pos-fields {
				display: none;
			}

			.custom-pos-fields.visible {
				display: flex;
			}

			.message-counter {
				font-size: 12px;
				color: #7f8c8d;
				margin-top: 4px;
			}

			.range-group {
				display: flex;
				align-items: center;
				gap: 6px;
				flex: 1;
			}

			.range-group input[type="range"] {
				flex: 1;
			}

			.range-value {
				font-size: 12px;
				color: #b9a3e3;
				min-width: 35px;
				text-align: right;
			}
		</style>
	</head>
	<body>
		<h2>Chat Overlay</h2>

		<!-- Master Toggle -->
		<div class="card">
			<div class="config-row">
				<label>Chat Overlay aktiv</label>
				<label class="toggle" style="margin-bottom:0;">
					<input type="checkbox" data-field="enabled" autocomplete="off" />
					<span class="toggle-slider"></span>
				</label>
			</div>
			<div class="message-counter">Nachrichten im Buffer: <span id="msg-count">0</span></div>
		</div>

		<!-- Position & Size -->
		<div class="card">
			<div class="section-title">Position &amp; Gr&ouml;&szlig;e</div>
			<div class="config-row">
				<label>Position</label>
				<select data-field="position">
					<option value="top-left">Oben Links</option>
					<option value="top-right">Oben Rechts</option>
					<option value="bottom-left">Unten Links</option>
					<option value="bottom-right">Unten Rechts</option>
					<option value="custom">Benutzerdefiniert</option>
				</select>
			</div>
			<div class="config-row custom-pos-fields" id="custom-pos">
				<label>X / Y</label>
				<input type="number" data-field="customX" min="0" max="1920" />
				<input type="number" data-field="customY" min="0" max="1080" />
			</div>
			<div class="config-row">
				<label>Breite</label>
				<input type="number" data-field="width" min="200" max="1920" />
				<span class="hint-text">px</span>
			</div>
			<div class="config-row">
				<label>H&ouml;he</label>
				<input type="number" data-field="height" min="200" max="1080" />
				<span class="hint-text">px</span>
			</div>
		</div>

		<!-- Appearance -->
		<div class="card">
			<div class="section-title">Darstellung</div>
			<div class="config-row">
				<label>Hintergrundfarbe</label>
				<input type="color" data-field="backgroundColor" />
			</div>
			<div class="config-row">
				<label>BG-Deckkraft</label>
				<div class="range-group">
					<input type="range" data-field="backgroundOpacity" min="0" max="1" step="0.05" />
					<span class="range-value" id="opacity-label">0.60</span>
				</div>
			</div>
			<div class="config-row">
				<label>Textfarbe</label>
				<input type="color" data-field="textColor" />
			</div>
			<div class="config-row">
				<label>Schriftart</label>
				<select data-field="fontFamily">
					<option value="">System-Standard</option>
					<option value="Roboto">Roboto</option>
					<option value="Open Sans">Open Sans</option>
					<option value="Montserrat">Montserrat</option>
					<option value="Poppins">Poppins</option>
					<option value="Oswald">Oswald</option>
					<option value="Outfit">Outfit</option>
				</select>
			</div>
			<div class="config-row">
				<label>Schriftgr&ouml;&szlig;e</label>
				<input type="number" data-field="fontSize" min="10" max="48" />
				<span class="hint-text">px</span>
			</div>
			<div class="config-row">
				<label>Border-Radius</label>
				<input type="number" data-field="borderRadius" min="0" max="30" />
				<span class="hint-text">px</span>
			</div>
		</div>

		<!-- Chat Behavior -->
		<div class="card">
			<div class="section-title">Chat-Verhalten</div>
			<div class="config-row">
				<label>Max. Nachrichten</label>
				<input type="number" data-field="maxMessages" min="5" max="100" />
			</div>
			<div class="config-row">
				<label>Fade-Out</label>
				<input type="number" data-field="fadeOutSeconds" min="0" max="300" />
				<span class="hint-text">Sek. (0 = nie)</span>
			</div>
			<div class="config-row">
				<label>Badges anzeigen</label>
				<label class="toggle" style="margin-bottom:0;">
					<input type="checkbox" data-field="showBadges" autocomplete="off" />
					<span class="toggle-slider"></span>
				</label>
			</div>
			<div class="config-row">
				<label>Zeitstempel</label>
				<label class="toggle" style="margin-bottom:0;">
					<input type="checkbox" data-field="showTimestamps" autocomplete="off" />
					<span class="toggle-slider"></span>
				</label>
			</div>
			<div class="config-row">
				<label>Emotes anzeigen</label>
				<label class="toggle" style="margin-bottom:0;">
					<input type="checkbox" data-field="showEmotes" autocomplete="off" />
					<span class="toggle-slider"></span>
				</label>
			</div>
			<div class="config-row">
				<label>Nachr.-Abstand</label>
				<input type="number" data-field="messageSpacing" min="0" max="20" />
				<span class="hint-text">px</span>
			</div>
		</div>

		<!-- Usernames -->
		<div class="card">
			<div class="section-title">Benutzernamen</div>
			<div class="config-row">
				<label>Twitch-Farben</label>
				<label class="toggle" style="margin-bottom:0;">
					<input type="checkbox" data-field="useTwitchColors" autocomplete="off" />
					<span class="toggle-slider"></span>
				</label>
			</div>
			<div class="config-row">
				<label>Standard-Farbe</label>
				<input type="color" data-field="defaultUsernameColor" />
			</div>
		</div>

		<!-- Filters -->
		<div class="card">
			<div class="section-title">Filter</div>
			<div class="config-row">
				<label>Bot-Nachr. ausblenden</label>
				<label class="toggle" style="margin-bottom:0;">
					<input type="checkbox" data-field="hideBotMessages" autocomplete="off" />
					<span class="toggle-slider"></span>
				</label>
			</div>
			<div class="config-row" style="align-items:flex-start;">
				<label>Bot-Usernamen</label>
				<textarea data-field="botUsernames" rows="2" placeholder="Nightbot,StreamElements,..."></textarea>
			</div>
			<div class="config-row">
				<label>Commands (!...) ausbl.</label>
				<label class="toggle" style="margin-bottom:0;">
					<input type="checkbox" data-field="hideCommands" autocomplete="off" />
					<span class="toggle-slider"></span>
				</label>
			</div>
			<div class="config-row" style="align-items:flex-start;">
				<label>Versteckte User</label>
				<textarea data-field="hiddenUsers" rows="2" placeholder="user1,user2,..."></textarea>
			</div>
		</div>

		<!-- Animation -->
		<div class="card">
			<div class="section-title">Animation</div>
			<div class="config-row">
				<label>Animation</label>
				<select data-field="animation">
					<option value="slide">Slide</option>
					<option value="fade">Fade</option>
					<option value="none">Keine</option>
				</select>
			</div>
		</div>

		<!-- Actions -->
		<div class="card">
			<div class="section-title">Aktionen</div>
			<div class="btn-group">
				<button id="btn-save" class="btn-primary">Speichern</button>
				<button id="btn-test" class="btn-secondary">Test-Nachricht</button>
				<button id="btn-clear" class="btn-danger">Chat leeren</button>
			</div>
		</div>

		<script type="module" src="./chat-settings.js"></script>
	</body>
</html>
